<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hi Cute ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffb6c1,#ffc0cb,#ffe4e1);
    font-family:'Arial',sans-serif;
}

.card{
    text-align:center;
    background:rgba(255,255,255,0.8);
    padding:25px;
    border-radius:25px;
    box-shadow:0 8px 25px rgba(255,105,180,0.3);
}

.photo{
    width:280px;
    height:280px;
    object-fit:cover;
    border-radius:20px;
    border:6px solid #ff69b4;
    box-shadow:0 0 20px rgba(255,105,180,0.5);
}

.text{
    margin-top:15px;
    font-size:40px;
    font-weight:bold;
    color:#ff1493;
    text-shadow:2px 2px 10px rgba(255,20,147,0.3);
}

.hearts{
    margin-top:10px;
    font-size:28px;
    animation:float 1.5s infinite ease-in-out;
}

@keyframes float{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-8px);
    }
}
</style>
</head>
<body>

<div class="card">
    <img src="4f4eda8d-b853-4b7a-b61e-7bafde24aae4.jfif" alt="Cute Photo" class="photo">

    <div class="text">Hi Cute 💖</div>

    <div class="hearts">
        💕 💗 💖 💘 💝
    </div>
</div>

</body>
</html>
